# Quantumult X Optional Extensions - Ads
#
# Raw:
# https://raw.githubusercontent.com/3kaiu/config/main/Profile/QX-Optional-Ads.conf
#
# 用法：
# 1. 主配置仍使用 Profile/QX.conf
# 2. 基础去广告之外，如果某个 App 仍有残留广告，再按需合并下面条目
#
# 不建议全部同时开启。优先按单 App 逐项增加。

[rewrite_remote]

https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/WeiboAds.conf, tag=微博去广告, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/Applet.conf, tag=微信小程序去广告, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/WeChat.conf, tag=微信公众号去广告, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/Html/General.conf, tag=网页去广告, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/BaiduSearch.conf, tag=百度搜索去广告, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/Zhihu.conf, tag=知乎去广告增强, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/Ximalaya.conf, tag=喜马拉雅去广告, update-interval=86400, opt-parser=false, enabled=true

[mitm]

hostname = *.zhimg.com, *.zhihu.com, *.weibo.cn, *.weibo.com, *.xiaohongshu.com, *.douyin.com, *.v.qq.com
