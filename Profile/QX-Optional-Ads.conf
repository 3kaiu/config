# Quantumult X Optional Extensions - Ads
#
# Raw:
# https://raw.githubusercontent.com/3kaiu/config/main/Profile/QX-Optional-Ads.conf
#
# 维护思路：
# - 这是自维护的专项去广告选择集
# - 参考可莉插件生态的覆盖面，以及墨鱼 / blackmatrix7 的规则选材
# - 不追求全量聚合，优先低冲突、好排障
# - 聚合入口只引用本仓库内的单 App 配置，避免上游调整直接影响默认行为
#
# 用法：
# 1. 主配置仍使用 Profile/QX.conf
# 2. 基础去广告之外，如果某个 App 仍有残留广告，再按需合并下面条目
#
# 不建议全部同时开启。优先按单 App 逐项增加。

[rewrite_remote]

# 参考来源见 Rewrite/Ads/SOURCES.md
https://raw.githubusercontent.com/3kaiu/config/main/Profile/Ads/Weibo.conf, tag=微博去广告, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/3kaiu/config/main/Profile/Ads/Web.conf, tag=网页去广告, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/3kaiu/config/main/Profile/Ads/Baidu.conf, tag=百度搜索去广告, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/3kaiu/config/main/Profile/Ads/Zhihu.conf, tag=知乎去广告增强, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/3kaiu/config/main/Profile/Ads/Ximalaya.conf, tag=喜马拉雅去广告, update-interval=86400, opt-parser=false, enabled=true
