# ═══════════════════════════════════════════════════════════
#  Loon — 终极全能配置 (v1.0)
#  核心: Zero-RTT 解析 · 穿透拦截 · 节点订阅 · KeLi插件生态
#  引擎支持: iOS Loon 3.0+
# ═══════════════════════════════════════════════════════════

[General]
# -- 基础网络设置 --
ipv6 = false
dns-server = system, 1.12.12.12, 223.5.5.5
# 强制 DoH Zero-RTT 并发解析 (腾讯 + 阿里)
doh-server = https://1.12.12.12/dns-query, https://223.5.5.5/dns-query
# 彻底阻断 UDP 443，强制大厂广告降级为 TCP (解密必备)
udp-drop-port = 443
allow-udp-proxy = true

# -- Wi-Fi 局域网分享 --
wifi-access-http-port = 7222
wifi-access-socks5-port = 7221

# -- 真实 IP 映射 (避开代理) --
# ★ 确保支付类 App 及内网不走代理，防止异常
bypass-tun = 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.88.99.0/24, 192.168.0.0/16, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 255.255.255.255/32
# ★ 释放 Fake-IP 极限速度，仅将真正的内网与银行验证放行公网 DNS
real-ip = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.local, *.lan, *.home.arpa

[Host]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🎯 DNS 精准下沉 (为国内大厂建立 VIP 解析专线，消除解析耗时)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*.taobao.com = server:223.5.5.5
*.tmall.com = server:223.5.5.5
*.alipay.com = server:223.5.5.5
*.alicdn.com = server:223.5.5.5
*.qq.com = server:119.29.29.29
*.tencent.com = server:119.29.29.29
*.weixin.qq.com = server:119.29.29.29
*.jd.com = server:119.29.29.29
*.baidu.com = server:223.5.5.5
*.bilibili.com = server:223.5.5.5

[Proxy]
# -- 手动节点专区 --
# 你的自定义节点可以存放在这里

[Remote Proxy]
# -- 节点订阅专区 --
# 替换为你的机场订阅链接
# Alias = https://your.subscription.link, udp=true, fast-open=true, vmess-aead=true

[Proxy Group]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🚦 极简智能策略组 (去繁就简，自动优选)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 默认分流策略 (兜底规则)
Final = select, Proxy, DIRECT

# 核心代理路由 (支持手动选择或使用 Auto 组)
Proxy = select, Auto

# 自动测速组 (自动测试节点延迟，选中最低延迟节点)
Auto = url-test, url = http://www.gstatic.com/generate_204, interval = 600

[Rule]
# -- 核心白名单直连 (防止拦截误杀广告奖励包) --
DOMAIN, ii.gdt.qq.com, DIRECT
DOMAIN-SUFFIX, pangolin-sdk-toutiao.com, DIRECT
DOMAIN-SUFFIX, pangolin-sdk-toutiao1.com, DIRECT
DOMAIN-SUFFIX, pangle.io, DIRECT

# -- 局域网与国内直连 --
GEOIP, CN, DIRECT
FINAL, Final

[Remote Rule]
# -- 顶配基础生态: 黑矩阵 Blackmatrix7 核心分流库 --
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Direct/Direct.list, policy=DIRECT, tag=直连修正, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Advertising/Advertising.list, policy=REJECT, tag=广告拦截, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Privacy/Privacy.list, policy=REJECT, tag=隐私保护, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Global/Global.list, policy=Proxy, tag=国际网站, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/China/China.list, policy=DIRECT, tag=国内网站, enabled=true

[Plugin]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 📊 UI 面板与高阶组件生态 (Dashboard & Tools)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# 节点详情与流量实时看板 (显示于 Loon 首页)
https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/Loon_node_info.plugin, tag=节点信息看板, enabled=true

# Sub-Store (代理圈最强订阅清洗与节点管理神器)
https://raw.githubusercontent.com/sub-store-org/Sub-Store/master/config/Loon.plugin, tag=Sub-Store 订阅管理器, enabled=true
