[MitM]
skip-server-cert-verify = true
# 核心解密域名 (插件会自动补全，但在此处声明以作兜底)
hostname = *.apple.com, *.icloud.com, h5.if.qidian.com, magev6.if.qidian.com, druid.if.qidian.com, ii.gdt.qq.com, api-access.pangolin-sdk-toutiao*.com
