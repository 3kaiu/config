^https:\/\/api\.zhihu\.com\/root\/window - reject-dict
^https:\/\/api\.zhihu\.com\/bazaar\/float_window - reject-dict
^https:\/\/api\.zhihu\.com\/market\/popovers_v2 - reject-dict
^https:\/\/api\.zhihu\.com\/me\/guides - reject-dict
