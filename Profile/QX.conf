[rewrite_local]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HTTPDNS API 正则拦截 (防止 API 直接通过 IP 发起解析)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
^https?:\/\/119\.29\.29\.29\/d url reject-200
^https?:\/\/203\.107\.1\.1\/d url reject-200
^https?:\/\/223\.5\.5\.5\/d url reject-200
^https?:\/\/1\.12\.12\.12\/d url reject-200
^https?:\/\/120\.53\.53\.53\/d url reject-200

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# YouTube 请求脚本补充 (v6.3 新增)
# ddgksf2013 YoutubeAds.conf 仅含 response 脚本, 此处补充 Maasea 最新 request 脚本
# - initplayback: 处理 UMP (Unified Media Pipeline) 加密, 302 重定向到 Cloudflare Worker
# - log_event: 剥离 content-encoding 头, 按缓存状态清理 x-youtube-hot-hash-data 头
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
^https?:\/\/[\w-]+\.googlevideo\.com\/initplayback.+&ack url script-request-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.request.js
^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/log_event url script-request-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.request.js

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# YouTube 响应端点补充 (v6.3 新增)
# ddgksf2013 YoutubeAds.conf 的 response 正则缺少 log_event 和 config 端点, 此处补充
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(log_event|config) url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js

