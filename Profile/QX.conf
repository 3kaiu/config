# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [rewrite_remote]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[rewrite_remote]

# 核心去广告 (综合基础拦截，已剔除误伤起点的规则)
https://ghproxy.net/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/QuantumultX/AllInOne/AllInOne.conf#type=rewrite&outhn=gdt.qq.com&regout=api-access\\.[0-9a-zA-Z_-]+\\.com\\/api\\/ad, tag=全能去广告(基础), update-interval=86400, opt-parser=true, enabled=true
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [rewrite_local] & [task_local]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[rewrite_local]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🚀 起点全能助手 v4.2 (抓包驱动，去碎片化)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# 1. 广点通/穿山甲广告秒播 (拦截底层广告SDK修改视频时长)
^https?:\/\/ii\.gdt\.qq\.com\/gdt_inner_view url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js
^https?:\/\/api-access\.pangolin-sdk-toutiao\d*\.com\/api\/ad\/union\/sdk\/get_ads url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js
^https?:\/\/adsmind\.gdtimg\.com\/.*\.mp4 url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js

# 2. 自动重放与签到 Token 窃取 (request 阶段)
^https:\/\/(h5|magev6)\.if\.qidian\.com\/argus\/api\/v\d+\/video\/adv\/finishWatch url script-request-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js
^https:\/\/magev6\.if\.qidian\.com\/argus\/api\/v1\/client\/getconf url script-request-header https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js

# 3. getconf response 覆写 — 独立规则确保 BookShelfBottomIcons/AdVideoPositionConfig 等悬浮广告字段被删除
^https:\/\/(h5|magev6)\.if\.qidian\.com\/argus\/api\/v1\/client\/getconf url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js

# 4. 终极深度净化 v4.2
# 修复: bookshelf/refreshInfo 和 getHighLevelBookReadInfo 是正常书架数据，已移出
# 修复: getconf 独立为单独规则，不再依赖此处的 $ 末尾匹配
^https:\/\/(h5|magev6)\.if\.qidian\.com\/argus\/api\/(v\d+\/video\/adv\/mainPage|v\d+\/video\/adv\/mainPageDialog|v\d+\/video\/adv\/reportDialog|v\d+\/adv\/getadvlistbatch|v\d+\/deeplink\/geturl|v\d+\/dailyrecommend|v\d+\/checkin\/(lottery|checkinexchangepage)|v\d+\/user\/getsimplediscover|v\d+\/bookshelf\/(getHoverAdv|getTopOperation|getad)|v\d+\/client\/iosad|v\d+\/push\/getdialog|v\d+\/booksearch\/hotWords|v\d+\/maintain\/playstrip|v\d+\/young\/getconf|v\d+\/freshman\/(bookshelfbtn|freshmanGuidePopup)|v\d+\/message\/(getpushedmessagelist|pullOperationPush|pullSocialPush)|v\d+\/followsubscribe\/showChapterEndModule|v\d+\/user\/getaccountpage|v\d+\/client\/getsplashscreen|v\d+\/reddot\/getdot|v\d+\/popup\/batchget|v\d+\/ploy\/getactivitylist|v\d+\/interaction\/getclassicbookinfo) url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js


[task_local]
# 每日早晨9点，全自动白嫖起点经验硬币 (静默签到)
0 0 9 * * * https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js, tag=起点全自动签到, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Task.png, enabled=true

event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/geo_location.js, tag=查看IP信息, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Location.png, enabled=true
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/traffic-check.js, tag=策略流量查询, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Speedtest.png, enabled=true
event-interaction https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/scripts/server_info.js, tag=节点详情, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png, enabled=true


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [http_backend] & [mitm]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[http_backend]

[mitm]
skip_validating_cert=false
force_sni_domain_name=false

# 基础盘仅保留默认启用模块所需的 MITM 域名；可选模块的域名见对应 Optional 文件
hostname = -*.apple.com, -*.icloud.com, -*.icloud.com.cn, -*bank*, -*pay*, -*.boc.cn, -*.abchina.com, -*.ccb.com, -*.psbc.com, -*.cmbchina.com, boxjs.com, *.google.com, *.googlevideo.com, *.youtube.com, *.bilibili.com, *.hdslb.com, weather-*.apple.com, api.smoot.apple.com, beta.itunes.apple.com, testflight.apple.com, h5.if.qidian.com, druid.if.qidian.com, magev6.if.qidian.com, ii.gdt.qq.com, api-access.pangolin-sdk-toutiao*.com
