# ═══════════════════════════════════════════════════════════
#  Quantumult X — 终极全功能配置 (v13 Pro+ Max)
#  核心: 自动重放 · 视频秒播 · 深度去广告 · 功能解锁 · 抓包
#  维护: 3kaiu
# ═══════════════════════════════════════════════════════════
#
# ┌──────────────────────────────────────────────────────────┐
# │  📱 抓包 — 无需脚本，任意电脑                             │
# │                                                          │
# │  方式 A: 手机自身抓包                                     │
# │    QX → 工具 & 分析 → 开启「HTTP 数据抓取」               │
# │                                                          │
# │  方式 B: 手机流量 → 电脑分析                               │
# │    1. 取消注释 [server_local] 调试节点，改为电脑 IP        │
# │    2. Debug 策略组选该节点                                 │
# │    3. Final 策略组切到 Debug                               │
# │    4. 完毕后 Final 切回 Auto_Proxy                        │
# │                                                          │
# │  方式 C: 电脑流量 → 手机代理 (零配置，推荐)                │
# │    1. QX → 设置 → 其他设备 → 开启 HTTP 代理               │
# │    2. 记下手机 IP:端口                                     │
# │    3. 电脑系统代理设为 手机IP:端口                          │
# │    4. 电脑所有流量走手机 QX，手机端可抓包查看               │
# │    ★ 无需改配置，换电脑也能用                               │
# │                                                          │
# │  ⚠️ MITM 证书: 设置→通用→关于→证书信任设置→开启            │
# └──────────────────────────────────────────────────────────┘


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [general]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[general]

resource_parser_url=https://ghproxy.net/https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

network_check_url=http://cp.cloudflare.com/generate_204
server_check_url=http://www.gstatic.com/generate_204
server_check_timeout=5000

geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://ghproxy.net/https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js

fallback_udp_policy=reject
udp_whitelist=53, 123, 1900, 80-443
udp_drop_list=443, QUIC

icmp_auto_reply=true

# ★ 释放 Fake-IP (极大提升起步加载速度)：已将 qidian、snssdk、gdt 移除，让它们享受毫秒级假IP映射！
# 仅保留真正的真实 IP 验证域名 (如银行支付、内网直连等)
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.local, *.lan, *.home.arpa

excluded_routes=192.168.0.0/16, 172.16.0.0/12, 10.0.0.0/8, 100.64.0.0/10, 239.255.255.250/32

dns_reject_domain_behavior=loopback

# (隐私信息已脱敏)
;running_mode_trigger=filter, filter, YourWiFiName:filter


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [dns]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[dns]

no-ipv6
prefer-doh3

circumvent-ipv4-answer=127.0.0.1, 0.0.0.0
circumvent-ipv6-answer=::

server=223.5.5.5
server=119.29.29.29

# 腾讯与阿里 DoH 极速并发组合 (Zero-RTT 直连)
doh-server=https://1.12.12.12/dns-query, https://223.5.5.5/dns-query

# 极简直连路由分发
server=/*.taobao.com/223.5.5.5
server=/*.tmall.com/223.5.5.5
server=/*.alipay.com/223.5.5.5
server=/*.alicdn.com/223.5.5.5
server=/*.jd.com/119.29.29.29
server=/*.qq.com/119.29.29.29
server=/*.tencent.com/119.29.29.29
server=/*.weixin.qq.com/119.29.29.29
server=/*.bilibili.com/223.5.5.5
server=/*.meituan.com/223.5.5.5
server=/*.baidu.com/223.5.5.5
server=/*.douyin.com/119.29.29.29
server=/*.163.com/119.29.29.29
server=/*.mi.com/223.5.5.5
server=/*.apple.com/223.5.5.5
server=/*.icloud.com/223.5.5.5
server=/*.icloud.com.cn/223.5.5.5

address=/mtalk.google.com/108.177.125.188


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [policy]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[policy]

url-latency-benchmark=Auto_Proxy, server-tag-regex=.*, check-interval=900, alive-checking=true, tolerance=100, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
static=AdBlock, reject, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Advertising.png
static=Debug, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Puzzle.png
static=Final, Auto_Proxy, Debug, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [server_remote] & [server_local]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[server_remote]
;https://your-subscription-url, tag=我的机场, update-interval=86400, opt-parser=true, enabled=true

[server_local]
# (调试节点IP已脱敏，需要电脑抓包时取消注释并填入你的电脑IP)
;http=192.168.x.x:9090, fast-open=false, udp-relay=false, tag=Proxyman抓包


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [filter_remote]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[filter_remote]

# CDN 直连
https://ghproxy.net/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Direct/Direct.list, tag=直连修正, force-policy=direct, update-interval=86400, opt-parser=false, enabled=true

# 广告与隐私拦截
https://ghproxy.net/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Advertising/Advertising.list, tag=广告拦截, force-policy=AdBlock, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Privacy/Privacy.list, tag=隐私保护, force-policy=AdBlock, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Hijacking/Hijacking.list, tag=运营商劫持, force-policy=AdBlock, update-interval=86400, opt-parser=false, enabled=true

# 代理分流
https://ghproxy.net/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Global/Global.list, tag=国际网站, force-policy=Auto_Proxy, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/China/China.list, tag=国内网站, force-policy=direct, update-interval=86400, opt-parser=false, enabled=true

FILTER_LAN, tag=局域网, force-policy=direct, enabled=true
FILTER_REGION, tag=GeoIP中国, force-policy=direct, enabled=true


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [filter_local]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[filter_local]

# ⚠️ 核心防杀白名单 (防止去广告规则集误杀广告 SDK 导致奖励脚本失效)
host, ii.gdt.qq.com, direct
host-suffix, pangolin-sdk-toutiao.com, direct
host-suffix, pangolin-sdk-toutiao1.com, direct
host-suffix, pangle.io, direct

# 起点与常见遥测域名直接在 filter 层拦截，优先于 rewrite，减少解密与脚本开销
host, path.book.qq.com, reject
host, rmonitor.qq.com, reject
host, unitelogreport.reader.qq.com, reject
host-keyword, qreport, reject
host, apmplus.volces.com, reject
host, mssdk.volces.com, reject
host, tobapplog.ctobsnssdk.com, reject
host, sdkreport.e.qq.com, reject
host, publiclog.zhiyan.tencent-cloud.net, reject
host, zhiyan.monitor.tencent-cloud.net, reject
host, ali-stats.jpush.cn, reject
host, aegis.cdn-go.cn, reject

host, localhost, direct
host, host.docker.internal, direct
host-suffix, local, direct

# CDN 直连
host-suffix, jsdelivr.net, direct
host-suffix, statically.io, direct
host-suffix, ghproxy.net, direct
host-suffix, fastly.net, direct
host-suffix, registry.npmjs.org, direct
host-suffix, registry.npmmirror.com, direct

host-keyword, garmin, direct

ip6-cidr, fe80::/10, direct

final, Final


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [rewrite_remote]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[rewrite_remote]

# 1. 自定义应用增强
https://raw.githubusercontent.com/3kaiu/config/main/Rewrite/qidian.snippet, tag=起点全能助手, update-interval=86400, opt-parser=false, enabled=true

# 2. 核心去广告
# 基线只保留一套综合规则，避免多个大而全模块同时改写同一响应体
https://ghproxy.net/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/QuantumultX/AllInOne/AllInOne.conf, tag=全能去广告, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/FakeiOSAds.conf, tag=开屏去广告, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/YoutubeAds.conf, tag=YouTube去广告, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/Function/UnblockURLinWeChat.conf, tag=微信解锁URL, update-interval=86400, opt-parser=false, enabled=true

# 3. 专项去广告增强（需要时见 QX-Optional-Ads.conf）

# 4. iRingo（基础盘仅保留低风险项；完整增强见 QX-Optional-Apple.conf）
https://github.com/NSRingo/WeatherKit/releases/latest/download/iRingo.WeatherKit.snippet, tag=iRingo-天气, update-interval=86400, opt-parser=true, enabled=true
https://github.com/NSRingo/TestFlight/releases/latest/download/iRingo.TestFlight.snippet, tag=iRingo-TestFlight, update-interval=86400, opt-parser=true, enabled=true

# 5. BiliUniverse（功能增强与去广告保留；区域全球化见 QX-Optional-Media.conf）
https://github.com/BiliUniverse/Enhanced/releases/latest/download/BiliBili.Enhanced.snippet, tag=B站-功能增强, update-interval=86400, opt-parser=true, enabled=true
https://github.com/BiliUniverse/ADBlock/releases/latest/download/BiliBili.ADBlock.snippet, tag=B站-去广告, update-interval=86400, opt-parser=true, enabled=true

# 6. DualSubs（需要字幕增强时见 QX-Optional-Media.conf）

# 7. 功能解锁
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/Function/Spotify.conf, tag=Spotify解锁, update-interval=86400, opt-parser=false, enabled=true
https://ghproxy.net/https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/Function/Netflix_ratings.conf, tag=Netflix评分, update-interval=86400, opt-parser=false, enabled=true

# 8. 工具链
