[general]
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
network_check_url=http://cp.cloudflare.com/generate_204
server_check_url=http://www.gstatic.com/generate_204
server_check_timeout=5000
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
fallback_udp_policy=reject

[dns]
no-ipv6
prefer-doh3
circumvent-ipv4-answer=127.0.0.1, 0.0.0.0
circumvent-ipv6-answer=::
server=223.5.5.5
server=119.29.29.29
doh-server=https://doh.pub/dns-query, https://dns.alidns.com/dns-query

# 国内域名指定本地 DNS
server=/*.taobao.com/223.5.5.5
server=/*.tmall.com/223.5.5.5
server=/*.alipay.com/223.5.5.5
server=/*.alicdn.com/223.5.5.5
server=/*.jd.com/119.29.29.29
server=/*.qq.com/119.29.29.29
server=/*.tencent.com/119.29.29.29
server=/*.weixin.qq.com/119.29.29.29
server=/*.bilibili.com/223.5.5.5
server=/*.meituan.com/223.5.5.5
server=/*.baidu.com/223.5.5.5
server=/*.douyin.com/119.29.29.29
server=/*.163.com/119.29.29.29
server=/*.mi.com/223.5.5.5
server=/*.apple.com/223.5.5.5
server=/*.icloud.com/223.5.5.5
server=/*.icloud.com.cn/223.5.5.5
address=/mtalk.google.com/108.177.125.188

[policy]
# 代理主策略：整合 Fallback 自动容灾，若东京节点超时自动回落直连，防止完全断网，剔除 url-test
static=Proxy, 🇯🇵 Tokyo_Proxy, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
static=Streaming, Proxy, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Streaming.png
static=AI, Proxy, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bot.png
static=Apple, direct, Proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
static=AdBlock, reject, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Advertising.png
static=Final, Proxy, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

[server_remote]
# ⚠️ 提示：请将您的自建东京单节点在 [server_local] 中命名为 "🇯🇵 Tokyo_Proxy"

[server_local]

[filter_remote]
# 置顶去广告规则，防止 China 规则提前匹配
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Advertising/Advertising.list, tag=🚫 广告域名, force-policy=reject, update-interval=86400, opt-parser=true, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/China/China.list, tag=🇨🇳 国内域名, force-policy=direct, update-interval=86400, opt-parser=true, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Global/Global.list, tag=🌍 国际域名, force-policy=Proxy, update-interval=86400, opt-parser=true, enabled=true

