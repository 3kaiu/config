hostname = -*.apple.com, -*.icloud.com, -*.icloud.com.cn, -*bank*, -*pay*, -*.boc.cn, -*.abchina.com, -*.ccb.com, -*.psbc.com, -*.cmbchina.com, boxjs.com, *.google.com, *.googlevideo.com, *.youtube.com, api.zhihuifangdong.net
