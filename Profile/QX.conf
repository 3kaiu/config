https://ghproxy.net/https://raw.githubusercontent.com/sub-store-org/Sub-Store/master/config/QX.snippet, tag=Sub-Store, update-interval=86400, opt-parser=false, enabled=false

# 9. Auraflare（需要 WARP 时见 QX-Optional-Network.conf）


