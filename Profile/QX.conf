# ═══════════════════════════════════════════════════════════
#  Quantumult X 配置 (QX.conf) — v16.1 (高级 NetOps 增强版)
#  核心: Fallback 高可用 · DoH3 国内加速 · 类型安全 Mock · 自维护应用精简
