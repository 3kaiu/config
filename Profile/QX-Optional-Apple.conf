# Quantumult X Optional Extensions - Apple
#
# Raw:
# https://raw.githubusercontent.com/3kaiu/config/main/Profile/QX-Optional-Apple.conf
#
# 用法：
# 1. 主配置仍使用 Profile/QX.conf
# 2. 需要 Apple 系统级增强时，再手动合并下面条目
#
# 适用：
# Siri / 定位 / 地图 / TV / News 等 Apple 系统级增强

[rewrite_remote]

https://github.com/NSRingo/Siri/releases/latest/download/iRingo.Siri.snippet, tag=iRingo-Siri, update-interval=86400, opt-parser=true, enabled=true
https://github.com/NSRingo/LocationService/releases/latest/download/iRingo.LocationService.snippet, tag=iRingo-定位服务, update-interval=86400, opt-parser=true, enabled=true
https://github.com/NSRingo/Maps/releases/latest/download/iRingo.Maps.snippet, tag=iRingo-地图, update-interval=86400, opt-parser=true, enabled=true
https://github.com/NSRingo/TV/releases/latest/download/iRingo.TV.snippet, tag=iRingo-TV, update-interval=86400, opt-parser=true, enabled=true
https://github.com/NSRingo/News/releases/latest/download/iRingo.News.snippet, tag=iRingo-News, update-interval=86400, opt-parser=true, enabled=true

[mitm]

hostname = weather-*.apple.com, api.smoot.apple.com, beta.itunes.apple.com, testflight.apple.com
