# Quantumult X Optional Extensions - Media
#
# Raw:
# https://raw.githubusercontent.com/3kaiu/config/main/Profile/QX-Optional-Media.conf
#
# 用法：
# 1. 主配置仍使用 Profile/QX.conf
# 2. 需要媒体区域增强或字幕增强时，再手动合并下面条目
#
# 适用：
# Bilibili 区域增强 / YouTube 与 Spotify 双语字幕

[rewrite_remote]

# Bilibili 区域增强
https://github.com/BiliUniverse/Global/releases/latest/download/BiliBili.Global.snippet, tag=B站-全球化, update-interval=86400, opt-parser=true, enabled=true

# 字幕增强
https://github.com/DualSubs/YouTube/releases/latest/download/DualSubs.YouTube.snippet, tag=双语字幕-YouTube, update-interval=86400, opt-parser=true, enabled=true
https://github.com/DualSubs/Universal/releases/latest/download/DualSubs.Universal.snippet, tag=双语字幕-通用, update-interval=86400, opt-parser=true, enabled=true
https://github.com/DualSubs/Spotify/releases/latest/download/DualSubs.Spotify.snippet, tag=双语字幕-Spotify, update-interval=86400, opt-parser=true, enabled=true

[mitm]

hostname = *.bilibili.com, *.hdslb.com, *.youtube.com, *.googlevideo.com
