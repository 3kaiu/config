# 起点全能助手 QX 模块
# 包含：广告秒播、全量覆写、福利精简、自动静默签到、高阶福利任务自动化、追踪屏蔽

[rewrite_local]
# 1. 广点通/穿山甲广告秒播
^https?:\/\/ii\.gdt\.qq\.com\/gdt_inner_view url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js
^https?:\/\/api-access\.pangolin-sdk-toutiao\d*\.com\/api\/ad\/union\/sdk\/get_ads url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js
^https?:\/\/(adsmind\.gdtimg\.com|adsmind\.ugdtimg\.com|pgdt\.gtimg\.cn)\/.*\.mp4 url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js

# 2. 自动重放与签到 Token 窃取 (request 阶段)
# ⚠️ 注意: QX rewrite 语法不支持 timeout 参数，脚本默认超时10秒
# 重放9次总计约90秒，如果超时导致重放不完整，可在脚本 CONFIG.TaskMapping 中减少 count
^https:\/\/(h5|magev6)\.if\.qidian\.com\/argus\/api\/v\d+\/video\/adv\/finishWatch url script-request-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js
^https:\/\/magev6\.if\.qidian\.com\/argus\/api\/v1\/client\/getconf url script-request-header https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js

# 3. getconf response 覆写
^https:\/\/(h5|magev6)\.if\.qidian\.com\/argus\/api\/v1\/client\/getconf url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js

# 4. 终极深度净化
^https:\/\/(h5|magev6)\.if\.qidian\.com\/argus\/api\/(v\d+\/video\/adv\/mainPage(?!Dialog)|v\d+\/video\/adv\/mainPageDialog|v\d+\/video\/adv\/reportDialog|v\d+\/adv\/getadvlistbatch|v\d+\/deeplink\/geturl|v\d+\/dailyrecommend|v\d+\/checkin\/(lottery|checkinexchangepage)|v\d+\/user\/getsimplediscover|v\d+\/bookshelf\/(getHoverAdv|getTopOperation|getad)|v\d+\/client\/iosad|v\d+\/push\/getdialog|v\d+\/booksearch\/hotWords|v\d+\/maintain\/playstrip|v\d+\/young\/getconf|v\d+\/freshman\/(bookshelfbtn|freshmanGuidePopup)|v\d+\/message\/(getpushedmessagelist|pullOperationPush|pullSocialPush)|v\d+\/followsubscribe\/showChapterEndModule|v\d+\/user\/getaccountpage|v\d+\/client\/getsplashscreen|v\d+\/reddot\/getdot|v\d+\/popup\/batchget|v\d+\/ploy\/getactivitylist|v\d+\/interaction\/getclassicbookinfo|v\d+\/readtime\/readpage) url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js

# 5. 获取 Cookie 重写 (获取成功后可注释此行)
^https?:\/\/h5\.if\.qidian\.com\/argus\/api\/v1\/user\/getlogininfo url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js

[task_local]
# ⚠️ 注意：当此文件作为远程重写引用订阅时，[task_local] 中的任务会被 QX 自动忽略。
# 如需使用此定时签到任务，请手动将下方任务配置复制粘贴到您本地的 QX.conf 的 [task_local] 下。
# （本项目主配置文件 Profile/QX.conf 已经默认内置了此任务）
# 定时执行 (默认每天2点11分)
11 2 * * * https://raw.githubusercontent.com/3kaiu/config/main/Scripts/Qidian.js, tag=起点读书自动签到(包含高阶任务), img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Qidian.png, enabled=true

[mitm]
hostname = h5.if.qidian.com, magev6.if.qidian.com, ii.gdt.qq.com, adsmind.gdtimg.com, adsmind.ugdtimg.com, pgdt.gtimg.cn, api-access.pangolin-sdk-toutiao*.com
