# 银行及云闪付去广告 QX 模块
# 包含：买单吧、云闪付、农业银行、中国银行的开屏与推广拦截，全面使用 Type-Safe Mocking

[rewrite_local]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 交通银行（买单吧/信用卡）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ⚠️ 开屏与弹窗接口包含 SSL Pinning，默认注释以防买单吧 App 无法联网
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interface\/common\/(qryPopAds|qryLaunchAds)\.do url reject-dict
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interaction\/common\/(getPopAds|queryGuidePageAds)\.do url reject-dict
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interaction\/appInfo\/appNewestVersion url reject-dict
# 广告图片 (无 SSL Pinning，可安全拦截)
^https?:\/\/creditcard\.bankcomm\.(com|cn)\/tfimg\/public00\/M00\/[a-zA-Z0-9]{2}\/[a-zA-Z0-9]{2}\/[a-zA-Z0-9-]{30}\.(jpg|jpeg) url reject

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2. 农业银行
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 开屏广告资源
^https?:\/\/midc\.cdn-static\.abchina\.com\.cn\/distributecenterimg\/file\/download\/(ed64|74b5|bdfb4|86fb9|7aa68|62b87|7c7d) url reject
# 活动推广弹窗
^https?:\/\/enjoy\.cdn-static\.abchina\.com\/yx-engine-web\/file\/download\/(?!7dc2|fe96|cea3|06a8|1b11|d57b|6918|61db|2d58|aa23|) url reject-dict
# 农业银行防代理检测
^https?:\/\/msmp\.abchina\.com\.cn url reject

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3. 中国银行（中国银行/缤纷生活）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 中国银行广告与主题图片 Mock (避免开屏与首页广告，无 SSL Pinning 安全拦截)
^https?:\/\/cdn1\.mbs\.boc\.cn\/ubas-mgateway-static\/images\/advertType\/ url reject-dict
^https?:\/\/cdn1\.mbs\.boc\.cn\/ubas-mgateway-static\/images\/\/theme\/ url reject-dict
# ⚠️ 以下接口包含 SSL Pinning，默认注释以防缤纷生活 App 无法联网
# 开屏广告
# ^https?:\/\/mlife\.jf365\.boc\.cn\/AppPrj\/FirstPic\.do\?txnId=2PIC000001 url reject-dict
# 首页弹窗/广告列表
# ^https?:\/\/openapi\.boc\.cn\/unlogin\/app\/cbsp\/query_ad_list url reject-dict

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 4. 云闪付
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ⚠️ 首页大图广告包含 SSL Pinning，默认注释以防云闪付无法联网
# ^https:\/\/wallet\.95516\.com(:10533)?\/s\/wl\/icon\/large\/1 url reject
# 首页推广模块
# ^https:\/\/base\.95516\.com\/app\/inApp\/sys\/appShowGroup\/ url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/UnionPay.js
# 理财页推广
# ^https:\/\/account\.95516\.com\/fortune\/inApp\/common\/ url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/UnionPay.js
# 推荐与权益
# ^https:\/\/content\.95516\.com\/koala-pre\/koala\/(recommend\/hotList|right\/queryAllRights) url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/UnionPay.js

[mitm]
# ⚠️ 移除了包含 SSL Pinning 校验的银行交易与通信核心域名：creditcardapp.bankcomm.com, creditcardapp.bankcomm.cn, mlife.jf365.boc.cn, openapi.boc.cn, wallet.95516.com, base.95516.com, account.95516.com, content.95516.com
# 仅解密静态广告 CDN 域名
hostname = creditcard.bankcomm.com, creditcard.bankcomm.cn, midc.cdn-static.abchina.com.cn, enjoy.cdn-static.abchina.com, cdn1.mbs.boc.cn
