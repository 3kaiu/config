# 银行及云闪付去广告 QX 模块
# ⚠️ v5.5 架构调整:
# 银行广告 CDN 的 REJECT 规则已移至主配置 QX.conf 的 [filter_local] 段，
# 放在银行 DIRECT 规则之前以确保优先级（QX 按顺序匹配，本地规则 > 远程引用规则）。
# 本文件现仅保留被注释的 SSL Pinning 接口（越狱用户可手动启用）。
#
# 🔴 P0 修复 (v5.5): 主配置 QX.conf [mitm] hostname 已用负向通配符排除所有银行域名，
# 防止 AllInOne/Toperlock/ddgksf2013 等远程去广告文件声明的银行 hostname 触发 MitM 解密。
# 银行 App 普遍启用 SSL Pinning，MitM 解密会导致 TLS 握手失败 → App 显示"网络错误"。
# 负向声明优先级高于远程 rewrite 文件的正向声明，确保银行域名永不被解密。

[rewrite_local]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 以下为包含 SSL Pinning 的接口，默认注释以防银行 App 无法联网（需越狱+SSL Kill Switch 才能启用）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 交通银行开屏与弹窗接口
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interface\/common\/(qryPopAds|qryLaunchAds)\.do url reject-dict
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interaction\/common\/(getPopAds|queryGuidePageAds)\.do url reject-dict
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interaction\/appInfo\/appNewestVersion url reject-dict
# 中国银行开屏广告
# ^https?:\/\/mlife\.jf365\.boc\.cn\/AppPrj\/FirstPic\.do\?txnId=2PIC000001 url reject-dict
# ^https?:\/\/openapi\.boc\.cn\/unlogin\/app\/cbsp\/query_ad_list url reject-dict
# 云闪付首页大图
# ^https:\/\/wallet\.95516\.com(:10533)?\/s\/wl\/icon\/large\/1 url reject
# ^https:\/\/base\.95516\.com\/app\/inApp\/sys\/appShowGroup\/ url script-response-body https://ws.wenn.in/main/Scripts/UnionPay.js
# ^https:\/\/account\.95516\.com\/fortune\/inApp\/common\/ url script-response-body https://ws.wenn.in/main/Scripts/UnionPay.js
# ^https:\/\/content\.95516\.com\/koala-pre\/koala\/(recommend\/hotList|right\/queryAllRights) url script-response-body https://ws.wenn.in/main/Scripts/UnionPay.js

[mitm]
# 不再解密任何银行域名。银行去广告完全通过主配置 DNS 级 REJECT 实现，无需 MitM。
