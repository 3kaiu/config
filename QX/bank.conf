# 银行及云闪付去广告 QX 模块
# 包含：买单吧、云闪付、农业银行、中国银行的开屏与推广拦截
# ⚠️ 修复: 原先依赖 MitM 解密的 rewrite 规则全部移除，改用 DNS 级 REJECT (filter_local)。
# 原因: creditcard.bankcomm.com / cdn1.mbs.boc.cn / enjoy.cdn-static.abchina.com 等域名
# 会被主配置 host-suffix bankcomm.com / boc.cn / abchina.com 的 direct 规则先匹配，
# MitM 再尝试解密这些直连流量会导致 TLS 握手被劫持 → 银行 App 网络错误。
# DNS 级 REJECT 在解析阶段就掐断广告 CDN，无需 MitM 解密，安全且无副作用。

[filter_local]
# 交通银行广告图片 CDN (原 MitM rewrite 改为 DNS 级 reject)
host, creditcard.bankcomm.com, reject
host, creditcard.bankcomm.cn, reject
# 交通银行埋点
host-suffix, track.bankcomm.com, reject

# 农业银行开屏广告资源 CDN (原 MitM rewrite 改为 DNS 级 reject)
host, midc.cdn-static.abchina.com.cn, reject
host, enjoy.cdn-static.abchina.com, reject
# 农业银行埋点
host, firefly.abchina.com.cn, reject
# 农业银行防代理检测
host, msmp.abchina.com.cn, reject

# 中国银行广告与主题图片 CDN (原 MitM rewrite 改为 DNS 级 reject，避免与 boc.cn direct 规则冲突)
host, cdn1.mbs.boc.cn, reject

# 云闪付广告域名
host, ads.95516.com, reject
host, switch.cup.com.cn, reject
host, tysdk.95516.com, reject

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 以下为包含 SSL Pinning 的接口，默认注释以防银行 App 无法联网（需越狱+SSL Kill Switch 才能启用）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 交通银行开屏与弹窗接口
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interface\/common\/(qryPopAds|qryLaunchAds)\.do url reject-dict
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interaction\/common\/(getPopAds|queryGuidePageAds)\.do url reject-dict
# ^https?:\/\/creditcardapp\.bankcomm\.(com|cn)\/mappweb_interaction\/appInfo\/appNewestVersion url reject-dict
# 中国银行开屏广告
# ^https?:\/\/mlife\.jf365\.boc\.cn\/AppPrj\/FirstPic\.do\?txnId=2PIC000001 url reject-dict
# ^https?:\/\/openapi\.boc\.cn\/unlogin\/app\/cbsp\/query_ad_list url reject-dict
# 云闪付首页大图
# ^https:\/\/wallet\.95516\.com(:10533)?\/s\/wl\/icon\/large\/1 url reject
# ^https:\/\/base\.95516\.com\/app\/inApp\/sys\/appShowGroup\/ url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/UnionPay.js
# ^https:\/\/account\.95516\.com\/fortune\/inApp\/common\/ url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/UnionPay.js
# ^https:\/\/content\.95516\.com\/koala-pre\/koala\/(recommend\/hotList|right\/queryAllRights) url script-response-body https://raw.githubusercontent.com/3kaiu/config/main/Scripts/UnionPay.js

[mitm]
# ⚠️ 修复: 不再解密任何银行域名。原先的 hostname 全部移除。
# hostname = (空) — 银行去广告完全通过 DNS 级 REJECT 实现，无需 MitM。
