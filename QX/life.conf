# 生活出行去广告 QX 模块
# 菜鸟包裹 — 净化推广与开屏广告

[rewrite_local]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 菜鸟包裹
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 首页瀑布流与推广
^https:\/\/nbcps-mtop\.cainiao\.com\/gw\/mtop\.cainiao\.nbcps\.presentation\.fetch\.cn url reject
# 广告/推销中心
^https:\/\/netflow-mtop\.cainiao\.com\/gw\/mtop\.cainiao\.guoguo\.nbnetflow\.ads\.index url reject
# 搜索栏推广词
^https:\/\/cn-acs\.m\.cainiao\.com\/gw\/mtop\.cainiao\.adkeyword\.get\.cn url reject
# 寄件页红包/广告
^https:\/\/cn-acs\.m\.cainiao\.com\/gw\/mtop\.cainiao\.guoguo\.nbnetflow\.ads\.m?show url reject

# 首页卡片净化
^https:\/\/(cn-acs\.m|e2e-mtop)\.cainiao\.com\/gw\/mtop\.cainiao\.app\.e2e\.engine\.page\.fetch url response-body-json-jq "del(.data.data.data.mainSearch.bizData.searchContents, .data.data.data.operationList)"
# 我的页面推广净化
^https:\/\/e2e-mtop\.cainiao\.com\/gw\/mtop\.cainiao\.app\.e2e\.engine\.page\.fetch\.cn url response-body-json-jq "del(.data.data.banner, .data.data.activity, .data.data.vip)"
# 发现页面推广净化
^https:\/\/longquan-mtop\.cainiao\.com\/gw\/mtop\.com\.cainiao\.longquan\.place\.getpageresourcecontent\.cn url response-body-json-jq "del(.data.result.placeContentMap[\"780001\"].contentList)"
# 阻塞开屏广告下发
^https:\/\/netflow-mtop\.cainiao\.com\/gw\/mtop\.cainiao\.guoguo\.nbnetflow\.ads url response-body-json-jq "if .data.result[0].materialId == \"39017\" then . else .data = {} end"

[filter_local]
# 菜鸟包裹 AMDC 规则 (防拦截后重新获取)
and, ((user-agent, Cainiao4iPhone*), (domain, amdc.m.taobao.com)), reject

[mitm]
hostname = netflow-mtop.cainiao.com, nbcps-mtop.cainiao.com, cn-acs.m.cainiao.com, e2e-mtop.cainiao.com, longquan-mtop.cainiao.com
