# 生活出行去广告 QX 模块
# 菜鸟包裹 — 净化推广与开屏广告
# ⚠️ v5.9 修复: response-body-json-jq 是 Loon 专有语法, QX 不支持
# QX 端改用 reject-200 (返回空响应), 牺牲精细净化但保证功能可用

[rewrite_local]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 菜鸟包裹
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 首页瀑布流与推广
^https:\/\/nbcps-mtop\.cainiao\.com\/gw\/mtop\.cainiao\.nbcps\.presentation\.fetch\.cn url reject
# 广告/推销中心
^https:\/\/netflow-mtop\.cainiao\.com\/gw\/mtop\.cainiao\.guoguo\.nbnetflow\.ads\.index url reject
# 搜索栏推广词
^https:\/\/cn-acs\.m\.cainiao\.com\/gw\/mtop\.cainiao\.adkeyword\.get\.cn url reject
# 寄件页红包/广告
^https:\/\/cn-acs\.m\.cainiao\.com\/gw\/mtop\.cainiao\.guoguo\.nbnetflow\.ads\.m?show url reject

# 首页卡片净化 (QX 不支持 json-jq, 改用 reject-200 返回空响应)
^https:\/\/(cn-acs\.m|e2e-mtop)\.cainiao\.com\/gw\/mtop\.cainiao\.app\.e2e\.engine\.page\.fetch url reject-200
# 我的页面推广净化
^https:\/\/e2e-mtop\.cainiao\.com\/gw\/mtop\.cainiao\.app\.e2e\.engine\.page\.fetch\.cn url reject-200
# 发现页面推广净化
^https:\/\/longquan-mtop\.cainiao\.com\/gw\/mtop\.com\.cainiao\.longquan\.place\.getpageresourcecontent\.cn url reject-200
# 阻塞开屏广告下发
^https:\/\/netflow-mtop\.cainiao\.com\/gw\/mtop\.cainiao\.guoguo\.nbnetflow\.ads url reject-200

[filter_local]
# 菜鸟包裹 AMDC 规则 (防拦截后重新获取)
and, ((user-agent, Cainiao4iPhone*), (domain, amdc.m.taobao.com)), reject

[mitm]
hostname = netflow-mtop.cainiao.com, nbcps-mtop.cainiao.com, cn-acs.m.cainiao.com, e2e-mtop.cainiao.com, longquan-mtop.cainiao.com
