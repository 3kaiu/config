# ⚠️ 版本固定: v3.1.0 — 如 NSRingo 清理旧 release 此配置将 404。建议定期检查最新版。
# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# iRingo WeatherKit QX 模块 (从 NSRingo/WeatherKit .plugin 转换)
# 解锁天气空气质量/降水地图/下一小时预报 (iOS 18+)
# 注意: QX 不支持 argument 传递, 参数需通过 BoxJS 配置
# 源: https://github.com/NSRingo/WeatherKit

[filter_local]
# 拦截天气分析事件
host, weather-analytics-events.apple.com, reject
host-suffix, tthr.apple.com, reject
host, tether.edge.apple.com, reject

[rewrite_local]
# WeatherKit API 响应覆写 (使用默认参数)
^https?:\/\/weatherkit\.apple\.com\/api\/v1\/availability\/ url script-response-body https://ws.wenn.in/main/Mirror/nsringo/WeatherKit-v3.1.0-response.bundle.js
^https?:\/\/weatherkit\.apple\.com\/api\/v2\/weather\/ url script-response-body https://ws.wenn.in/main/Mirror/nsringo/WeatherKit-v3.1.0-response.bundle.js

[mitm]
hostname = weatherkit.apple.com
