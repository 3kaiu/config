# ⚠️ 版本固定: v3.2.1 — 如 NSRingo 清理旧 release 此配置将 404。建议定期检查最新版。
# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# iRingo News QX 模块 (从 NSRingo/News .plugin 转换)
# 解锁 Apple News (中国大陆需走代理)
# 注意: QX 不支持 argument 传递, 参数需通过 BoxJS 配置
# 源: https://github.com/NSRingo/News

[filter_local]
# iCloud gateway 走代理 (News 需要相同代理线路)
host, gateway.icloud.com, Proxy
# Apple News 域名走代理
host, news-edge.apple.com, Proxy
host, news-events.apple.com, Proxy
host, apple.comscoreresearch.com, Proxy

[rewrite_local]
# News configs
^https?:\/\/news(-todayconfig)?-edge\.apple\.com\/v1\/configs url script-request-body https://github.com/NSRingo/News/releases/download/v3.2.1/request.bundle.js
# Analytics events
^https?:\/\/news(-sports)?-events\.apple\.com\/analyticseventsv2\/async url script-request-body https://github.com/NSRingo/News/releases/download/v3.2.1/request.bundle.js
# Search
^https?:\/\/news-client-search\.apple\.com\/v1\/search url script-request-header https://github.com/NSRingo/News/releases/download/v3.2.1/request.bundle.js

[mitm]
hostname = news-edge.apple.com, news-todayconfig-edge.apple.com, news-events.apple.com, news-sports-events.apple.com, news-client.apple.com, news-client-search.apple.com
