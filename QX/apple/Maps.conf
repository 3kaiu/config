# ⚠️ 版本固定: v4.6.1 — 如 NSRingo 清理旧 release 此配置将 404。建议定期检查最新版。
# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# iRingo Maps QX 模块 (从 NSRingo/Maps .plugin 转换)
# 解锁卫星地图/周边探索/国际版导航 (iOS 15+)
# 注意: QX 不支持 argument 传递, 参数需通过 BoxJS 配置
# 源: https://github.com/NSRingo/Maps

[filter_local]
# 高德地图直连
host-suffix, is.autonavi.com, direct
# Apple Maps CN 节点直连
host, gspe11-2-cn-ssl.ls.apple.com, direct
host, gspe12-cn-ssl.ls.apple.com, direct
host, gspe19-cn-ssl.ls.apple.com, direct
host, gspe19-2-cn-ssl.ls.apple.com, direct
host, gspe79-cn-ssl.ls.apple.com, direct

[rewrite_local]
# Network Defaults
^https?:\/\/configuration\.ls\.apple\.com\/config\/defaults url script-request-header https://github.com/NSRingo/Maps/releases/download/v4.6.1/request.bundle.js
^https?:\/\/configuration\.ls\.apple\.com\/config\/defaults url script-response-body https://github.com/NSRingo/Maps/releases/download/v4.6.1/response.bundle.js
# Announcements
^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/config\/announcements url script-request-header https://github.com/NSRingo/Maps/releases/download/v4.6.1/request.bundle.js
^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/config\/announcements url script-response-body https://github.com/NSRingo/Maps/releases/download/v4.6.1/response.bundle.js
# Resource Manifest
^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/geo_manifest\/dynamic\/config url script-request-header https://github.com/NSRingo/Maps/releases/download/v4.6.1/request.bundle.js
^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/geo_manifest\/dynamic\/config url script-response-body https://github.com/NSRingo/Maps/releases/download/v4.6.1/response.bundle.js

[mitm]
hostname = configuration.ls.apple.com, gspe35-ssl.ls.apple.com
