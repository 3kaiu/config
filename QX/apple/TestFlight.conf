# ⚠️ 版本固定: v3.4.0 — 如 NSRingo 清理旧 release 此配置将 404。建议定期检查最新版。
# ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# iRingo TestFlight QX 模块 (从 NSRingo/TestFlight .plugin 转换)
# 区域解锁/多账户切换/跨平台安装
# 注意: QX 不支持 argument 传递, 参数需通过 BoxJS 配置
# 源: https://github.com/NSRingo/TestFlight

[general]
# skip-proxy for TestFlight
# 注意: QX 的 skip-proxy 在 [general] 段已统一配置, 此处仅说明

[rewrite_local]
# TestFlight 请求和响应覆写
^https?:\/\/testflight\.apple\.com\/ url script-request-body https://ws.wenn.in/main/Mirror/nsringo/TestFlight-v3.4.0-request.bundle.js
^https?:\/\/testflight\.apple\.com\/ url script-response-body https://ws.wenn.in/main/Mirror/nsringo/TestFlight-v3.4.0-response.bundle.js

[mitm]
hostname = testflight.apple.com
