# iRingo Siri + Search QX 模块 (从 NSRingo/Siri .plugin 转换)
# 解锁 Siri 国际版 + 搜索建议 (iOS 15+, Siri 需 iOS 18+)
# 注意: QX 不支持 argument 传递, 参数需通过 BoxJS 配置
# 源: https://github.com/NSRingo/Siri

[rewrite_local]
# Siri Search (Siri 请求, iOS 18+)
^https?:\/\/(api-siri|api2|api-.+)\.smoot\.apple\.com\/search url script-request-header https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js
# SiriSearch (Siri 语音请求, iOS 18+)
^https?:\/\/(guzzoni|api2|api-.+)\.smoot\.apple\.com\/apple\.parsec\.siri\.v2alpha\.SiriSearch\/SiriSearch url script-request-body https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js
# Safari Search
^https?:\/\/api-safari(-.+)?\.smoot\.apple\.com\/apple\.parsec\.safari\.v1alpha\.SafariSearch\/SafariSearch url script-request-body https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js
# Lookup Search
^https?:\/\/api-lookup(-.+)?\.smoot\.apple\.com\/apple\.parsec\.lookup\.v1alpha\.LookupSearch\/LookupSearch url script-request-body https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js
# Visual Search
^https?:\/\/(api2|api-.+)\.smoot\.apple\.com\/apple\.parsec\.visualsearch\.v2\.VisualSearch\/VisualSearch url script-request-body https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js
# Engagement Search
^https?:\/\/(api-.+)\.smoot\.apple\.com\/apple\.parsec\.responseframework\.engagement\.v1alpha\.EngagementSearch\/EngagementSearch url script-request-body https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js
# Spotlight Suggest
^https?:\/\/(api-.+)\.smoot\.apple\.com\/apple\.parsec\.spotlight\.v1alpha\.ZkwSuggestService\/Suggest url script-request-body https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js

# Siri 建议 / Search (iOS 17.6 及以下)
# Bag
^https?:\/\/api2?\.smoot\.apple\.(com|cn)\/bag url script-request-header https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js
^https?:\/\/api2?\.smoot\.apple\.(com|cn)\/bag url script-response-body https://github.com/NSRingo/Siri/releases/download/v4.2.7/response.bundle.js
# Siri Suggestions Search
^https?:\/\/api(2|-.+)\.smoot\.apple\.(com|cn)\/search url script-request-header https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js
# Flight Search
^https?:\/\/api(2|-.+)\.smoot\.apple\.(com|cn)\/flight url script-request-header https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js

[mitm]
hostname = guzzoni.smoot.apple.com, api2.smoot.apple.com, *.smoot.apple.com, *.smoot.apple.cn
