# 起点自动签到及高阶任务 (ONZ3V / Yuheng0101 脚本)
# 
# 抓取 Cookie 步骤：
# 1. 开启此模块并更新资源，确保 MitM 包含 h5.if.qidian.com
# 2. 打开起点 App -> 我的 -> 福利中心，提示获取 Cookie 成功即可
# 3. 获取成功后建议在此文件中将第一行获取Cookie的重写前加#注释掉以减少网络开销
#
# 任务开关说明：
# 该脚本在 QX 中若需要调整执行的任务开关，请通过 BoxJs 配置以下参数：
# QDREADER_ADV_JOB_ENABLE (激励任务开关, 默认关)
# QDREADER_EXTRA_ADV_JOB_ENABLE (每日广告任务开关, 默认关)
# QDREADER_LOTTERY_ENABLE (每日抽奖开关, 默认关)
# QDREADER_WEEKLY_EXCHANGE_ENABLE (每周日自动兑换章节卡开关, 默认关)
# QDREADER_CHAPTER_CARD_ENABLE (章节卡查询开关, 默认关)
# QDREADER_MESSAGE_BOX_ENABLE (大咖荐书任务开关, 默认关)

[rewrite_local]
# 获取 Cookie 重写 (获取成功后可注释此行)
^https?:\/\/h5\.if\.qidian\.com\/argus\/api\/v1\/user\/getlogininfo url script-response-body https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/QDReader/qdreader.js

[task_local]
# 定时执行 (默认每天2点11分)
11 2 * * * https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/QDReader/qdreader.js, tag=起点读书自动签到(高阶任务), img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Task.png, enabled=true

[mitm]
hostname = h5.if.qidian.com
