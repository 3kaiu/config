name: Sync Kelee Plugins

on:
  schedule:
    - cron: '0 2 * * *' # Everyday at 02:00 UTC
  workflow_dispatch: # Enable manual run

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directories
        run: mkdir -p Kelee Plugins

      - name: Download core Kelee plugins (ajune0527/vpn_tool mirror)
        run: |
          curl -s -L -A "Loon/3.3.9" "https://raw.githubusercontent.com/ajune0527/vpn_tool/master/Tool/Loon/Plugin/Prevent_DNS_Leaks.plugin" -o Kelee/Prevent_DNS_Leaks.plugin
          curl -s -L -A "Loon/3.3.9" "https://raw.githubusercontent.com/ajune0527/vpn_tool/master/Tool/Loon/Plugin/Remove_ads_by_keli.plugin" -o Kelee/Remove_ads_by_keli.plugin
          curl -s -L -A "Loon/3.3.9" "https://raw.githubusercontent.com/ajune0527/vpn_tool/master/Tool/Loon/Plugin/YouTube_remove_ads.plugin" -o Kelee/YouTube_remove_ads.plugin
          curl -s -L -A "Loon/3.3.9" "https://raw.githubusercontent.com/jqyisbest/RuCu6/main/Plugins/myblockads.plugin" -o Kelee/myblockads.plugin
          # ⚠️ 修复: myblockads.plugin 内部仍引用已删除的 RuCu6/Loon 仓库的 script-path 和 icon
          # 替换为存活的 jqyisbest/RuCu6 镜像源，防止脚本 404 导致去广告功能失效
          sed -i 's|raw.githubusercontent.com/RuCu6/Loon/main/Scripts|raw.githubusercontent.com/jqyisbest/RuCu6/main/Scripts|g' Kelee/myblockads.plugin
          sed -i 's|raw.githubusercontent.com/RuCu6/Loon/main/Icons|raw.githubusercontent.com/jqyisbest/RuCu6/main/Icons|g' Kelee/myblockads.plugin

      - name: Backup ajune0527 Loon App plugins (防上游删除/改名导致失效)
        run: |
          for p in Weibo_remove_ads Weixin_Official_Accounts_remove_ads Bilibili_remove_ads NeteaseCloudMusic_remove_ads Amap_remove_ads Taobao_remove_ads JD_remove_ads Tieba_remove_ads Himalaya_remove_ads CoolApk_remove_ads IThome_remove_ads BaiduNetDisk_remove_ads Reddit_remove_ads Soul_remove_ads Zhihu_remove_ads 12306_remove_ads AliYunDrive_remove_ads QQMusic_remove_ads smzdm_remove_ads Cainiao_remove_ads Sub-Store QuickSearch; do
            curl -s -L -A "Loon/3.3.9" "https://raw.githubusercontent.com/ajune0527/vpn_tool/master/Tool/Loon/Plugin/${p}.plugin" -o "Plugins/${p}.plugin"
          done

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Kelee/ Plugins/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync Kelee + ajune0527 plugins with Loon User-Agent"
            git push
          fi
