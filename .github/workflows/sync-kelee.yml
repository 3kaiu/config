name: Sync Kelee Plugins

on:
  schedule:
    - cron: '0 2 * * *' # Everyday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Prevent_DNS_Leaks.plugin (ajune0527/vpn_tool mirror)
        run: |
          curl -fsSL -m 60 -A "Loon/3.3.9" "https://raw.githubusercontent.com/ajune0527/vpn_tool/master/Tool/Loon/Plugin/Prevent_DNS_Leaks.plugin" -o Kelee/Prevent_DNS_Leaks.plugin
          # v7.2: 移除 Remove_ads_by_keli / myblockads 同步 (已淘汰)
          # v7.8: Sub-Store/QuickSearch 已迁移到自维护 Plugin/ 目录，不再引用 ajune0527 远程 URL
          # v7.2: YouTube_remove_ads.plugin 仍为自维护，不参与同步

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Kelee/Prevent_DNS_Leaks.plugin
          # YouTube_remove_ads.plugin 为自维护，从 add 中排除
          git reset Kelee/YouTube_remove_ads.plugin 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync Prevent_DNS_Leaks.plugin"
            git push
          fi
