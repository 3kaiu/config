name: Mirror External Scripts

on:
  schedule:
    - cron: '0 3 * * *' # Everyday at 03:00 UTC (after sync-kelee @02:00 + health @02:17)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # е®үе…Ёж”№йҖ  (2026-07 е®Ўи®Ў):
      # 1. еҶҷе…ҘеүҚй—ЁзҰҒ: *.js иҝҮ node --check иҜӯжі• / дҪ“з§ҜвүҘ200B / йқһ HTML й”ҷиҜҜйЎө вҖ” д»»дёҖдёҚиҝҮдҝқз•ҷж—§ж–Үд»¶
      # 2. MANIFEST.json: жҜҸдёӘй•ңеғҸж–Үд»¶и®°еҪ• source_url + sha256 + жҠ“еҸ–ж—¶й—ҙ, еҸҳжӣҙеңЁ PR diff дёӯй«ҳдә®
      # 3. PR еҲ¶: дёҚеҶҚзӣҙжҺЁ main вҖ” жҺЁйҖҒеҲ° mirror/<date> еҲҶж”Ҝе№¶ејҖ/жӣҙж–° PR, дәәе·Ҙе®Ў diff еҗҺеҗҲе№¶
      # 4. иҰҶзӣ–иҢғеӣҙ: и„ҡжң¬ + и§„еҲҷеҲ—иЎЁ + rewrite жЁЎеқ— + NSRingo жҸ’д»¶ (зүҲжң¬еӣәе®ҡ),
      #    Profile е…ЁйғЁиҝңзЁӢеј•з”Ёж”¶ж•ӣеҲ°иҮӘе»ә CDN (ws.wenn.in/main/Mirror/...)
      - name: Mirror upstream resources (with gates)
        run: |
          SUCCESS=0
          FAIL=0
          GATED=0
          OLD_MANIFEST="Mirror/MANIFEST.json"

          # иҜ»еҸ–ж—§жё…еҚ•дёӯжҹҗж–Үд»¶зҡ„и®°еҪ• (з”ЁдәҺжҠ“еҸ–еӨұиҙҘж—¶дҝқз•ҷж—§ sha)
          old_entry() {
            [ -f "$OLD_MANIFEST" ] && node -e '
              const m = JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"));
              const e = m.files && m.files[process.argv[2]];
              if (e) console.log(JSON.stringify(e));
            ' "$OLD_MANIFEST" "$1" 2>/dev/null || true
          }

          declare -a ENTRIES

          mirror() {
            local url="$1"
            local dest="$2"
            local name="$3"
            local path="Mirror/$dest"
            mkdir -p "$(dirname "$path")"
            local tmpf; tmpf=$(mktemp)
            if ! curl -fsSL -m 90 --retry 3 -A "Loon/3.3.9" "$url" -o "$tmpf"; then
              echo "вқҢ $name (FETCH FAILED)"
              FAIL=$((FAIL + 1))
              local oe; oe=$(old_entry "$dest"); [ -n "$oe" ] && ENTRIES+=("\"$dest\": $oe")
              rm -f "$tmpf"; return
            fi
            # в”Җв”Җ й—ЁзҰҒ 1: дҪ“з§ҜдёӢйҷҗ (йҳІ 200 зҠ¶жҖҒз Ғзҡ„ HTML й”ҷиҜҜйЎө/еҚҠжҲӘдј иҫ“) в”Җв”Җ
            local size; size=$(wc -c < "$tmpf")
            if [ "$size" -lt 200 ]; then
              echo "рҹҡ« $name й—ЁзҰҒжӢҰжҲӘ: дҪ“з§ҜиҝҮе°Ҹ (${size}B), дҝқз•ҷж—§зүҲ"
              GATED=$((GATED + 1)); FAIL=$((FAIL + 1))
              local oe; oe=$(old_entry "$dest"); [ -n "$oe" ] && ENTRIES+=("\"$dest\": $oe")
              rm -f "$tmpf"; return
            fi
            # в”Җв”Җ й—ЁзҰҒ 2: йқһ HTML в”Җв”Җ
            if head -c 200 "$tmpf" | grep -qi '<!doctype\|<html'; then
              echo "рҹҡ« $name й—ЁзҰҒжӢҰжҲӘ: еҶ…е®№дёә HTML й”ҷиҜҜйЎө, дҝқз•ҷж—§зүҲ"
              GATED=$((GATED + 1)); FAIL=$((FAIL + 1))
              local oe; oe=$(old_entry "$dest"); [ -n "$oe" ] && ENTRIES+=("\"$dest\": $oe")
              rm -f "$tmpf"; return
            fi
            # в”Җв”Җ й—ЁзҰҒ 3: JS иҜӯжі• (д»… .js; .list/.conf/.plugin йқһ JS) в”Җв”Җ
            case "$dest" in
              *.js)
                if ! node --check "$tmpf" 2>/dev/null; then
                  echo "рҹҡ« $name й—ЁзҰҒжӢҰжҲӘ: node --check иҜӯжі•й”ҷиҜҜ (еҸҜиғҪеҚҠжҲӘдёӢиҪҪ), дҝқз•ҷж—§зүҲ"
                  GATED=$((GATED + 1)); FAIL=$((FAIL + 1))
                  local oe; oe=$(old_entry "$dest"); [ -n "$oe" ] && ENTRIES+=("\"$dest\": $oe")
                  rm -f "$tmpf"; return
                fi
                ;;
            esac
            cp "$tmpf" "$path"
            rm -f "$tmpf"
            local sha; sha=$(sha256sum "$path" | awk '{print $1}')
            echo "вң… $name вҶ’ $path (sha256:${sha:0:12}вҖҰ, ${size}B)"
            SUCCESS=$((SUCCESS + 1))
            ENTRIES+=("\"$dest\": {\"source_url\": \"$url\", \"sha256\": \"$sha\", \"bytes\": $size, \"fetched_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          }

          # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ и„ҡжң¬ (жү§иЎҢдәҺ MitM дёҠдёӢж–Ү, жңҖй«ҳж•Ҹж„ҹ) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          mirror "https://gist.githubusercontent.com/ddgksf2013/4f53b7c6083678df25fecc8ff68b52c4/raw/netease.adblock.js" \
            "netease.adblock.js" "ddgksf2013 gist / netease.adblock.js"
          mirror "https://raw.githubusercontent.com/ddgksf2013/Scripts/refs/heads/master/amdc.js" \
            "amdc.js" "ddgksf2013/Scripts / amdc.js"
          mirror "https://raw.githubusercontent.com/ddgksf2013/Scripts/refs/heads/master/applet.js" \
            "applet.js" "ddgksf2013/Scripts / applet.js"
          mirror "https://raw.githubusercontent.com/app2smile/rules/master/js/bilibili-json.js" \
            "bilibili-json.js" "app2smile / bilibili-json.js"
          mirror "https://raw.githubusercontent.com/app2smile/rules/master/js/bilibili-proto.js" \
            "bilibili-proto.js" "app2smile / bilibili-proto.js"
          mirror "https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.request.js" \
            "youtube.request.js" "Maasea / youtube.request.js"
          mirror "https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/youtube.response.js" \
            "youtube.response.js" "Maasea / youtube.response.js"

          # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ и§ЈжһҗеҷЁи„ҡжң¬ (и®ўйҳ…и§Јжһҗж—¶жү§иЎҢ, еҸҜи§Ғе…ЁйғЁиҠӮзӮ№еҮӯжҚ®) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          mirror "https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js" \
            "rules/qx-resource-parser.js" "KOP-XIAO / resource-parser.js"
          mirror "https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js" \
            "rules/qx-ip-api.js" "KOP-XIAO / IP_API.js"
          mirror "https://github.com/sub-store-org/Sub-Store/releases/latest/download/sub-store-parser.loon.min.js" \
            "rules/loon-sub-store-parser.js" "Sub-Store / sub-store-parser.loon.min.js"
          for s in "geo_location.js:qx-geo-location.js" "streaming-ui-check.js:qx-streaming-ui-check.js" "traffic-check.js:qx-traffic-check.js"; do
            src="${s%%:*}"; dst="${s##*:}"
            mirror "https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/$src" \
              "rules/$dst" "KOP-XIAO / $src"
          done

          # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ и§„еҲҷеҲ—иЎЁ (blackmatrix7, еҸҢз«Ҝж јејҸ) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          for n in Advertising Privacy Hijacking Epic China Global; do
            mirror "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/$n/$n.list" \
              "rules/qx-$n.list" "blackmatrix7 QX / $n.list"
            mirror "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/$n/$n.list" \
              "rules/loon-$n.list" "blackmatrix7 Loon / $n.list"
          done

          # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ QX rewrite жЁЎеқ— в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          mirror "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/QuantumultX/AllInOne/AllInOne.conf" \
            "rules/qx-AllInOne.conf" "blackmatrix7 / AllInOne.conf"
          for n in FakeiOSAds KeepAds WeiboAds WeChat NeteaseAds AmapAds TieBaAds GoofishAds SmzdmAds BiliBiliComicsAds QiShuiMusicAds RedditAds CainiaoAds TaoPiaoPiaoAds CaiYunAds Applet; do
            mirror "https://raw.githubusercontent.com/ddgksf2013/Rewrite/master/AdBlock/$n.conf" \
              "rules/qx-ddgksf-$n.conf" "ddgksf2013 / $n.conf"
          done
          mirror "https://raw.githubusercontent.com/app2smile/rules/master/module/bilibili-qx.conf" \
            "rules/qx-bilibili.conf" "app2smile / bilibili-qx.conf"

          # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ Loon rewrite жҸ’д»¶ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          # жіЁ: иҝҷдёӨдёӘжҸ’д»¶еҶ…йғЁ script-path д»ҚжҢҮеҗ‘ blackmatrix7 raw (дј йҖ’жҖ§дҫқиө–),
          # й•ңеғҸд»…ж¶ҲйҷӨжҸ’д»¶ж–Үд»¶жң¬иә«зҡ„еҚ•зӮ№, дј йҖ’еј•з”ЁйЈҺйҷ©и§Ғ doc/infrastructure.md
          mirror "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/Loon/AllInOne/AllInOne.plugin" \
            "rules/loon-AllInOne.plugin" "blackmatrix7 Loon / AllInOne.plugin"
          mirror "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/Loon/AdvertisingScript/AdvertisingScript.plugin" \
            "rules/loon-AdvertisingScript.plugin" "blackmatrix7 Loon / AdvertisingScript.plugin"

          # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ NSRingo bundle.js (зүҲжң¬еӣәе®ҡ release иө„дә§) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          # NSRingo .plugin еј•з”Ёзҡ„ bundle.js; иӢҘдёҠжёёжё…зҗҶж—§ release дјҡ 404, й•ңеғҸж¶ҲйҷӨеҚ•зӮ№
          mirror "https://github.com/NSRingo/WeatherKit/releases/download/v3.1.0/response.bundle.js" \
            "nsringo/WeatherKit-v3.1.0-response.bundle.js" "NSRingo WeatherKit / response.bundle.js v3.1.0"
          mirror "https://github.com/NSRingo/GeoServices/releases/download/v4.6.1/request.bundle.js" \
            "nsringo/GeoServices-v4.6.1-request.bundle.js" "NSRingo GeoServices / request.bundle.js v4.6.1"
          mirror "https://github.com/NSRingo/GeoServices/releases/download/v4.6.1/response.bundle.js" \
            "nsringo/GeoServices-v4.6.1-response.bundle.js" "NSRingo GeoServices / response.bundle.js v4.6.1"
          mirror "https://github.com/NSRingo/News/releases/download/v3.2.1/request.bundle.js" \
            "nsringo/News-v3.2.1-request.bundle.js" "NSRingo News / request.bundle.js v3.2.1"
          mirror "https://github.com/NSRingo/Siri/releases/download/v4.2.7/request.bundle.js" \
            "nsringo/Siri-v4.2.7-request.bundle.js" "NSRingo Siri / request.bundle.js v4.2.7"
          mirror "https://github.com/NSRingo/Siri/releases/download/v4.2.7/response.bundle.js" \
            "nsringo/Siri-v4.2.7-response.bundle.js" "NSRingo Siri / response.bundle.js v4.2.7"
          mirror "https://github.com/NSRingo/TestFlight/releases/download/v3.4.0/request.bundle.js" \
            "nsringo/TestFlight-v3.4.0-request.bundle.js" "NSRingo TestFlight / request.bundle.js v3.4.0"
          mirror "https://github.com/NSRingo/TestFlight/releases/download/v3.4.0/response.bundle.js" \
            "nsringo/TestFlight-v3.4.0-response.bundle.js" "NSRingo TestFlight / response.bundle.js v3.4.0"

          # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ NSRingo Loon жҸ’д»¶ (зүҲжң¬еӣәе®ҡ, жӣҝд»Ј releases/latest) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          mirror "https://github.com/NSRingo/WeatherKit/releases/download/v3.1.0/iRingo.WeatherKit.plugin" \
            "iringo/iRingo.WeatherKit.plugin" "NSRingo / iRingo.WeatherKit.plugin v3.1.0"
          mirror "https://github.com/NSRingo/Maps/releases/download/v4.6.1/iRingo.Maps.plugin" \
            "iringo/iRingo.Maps.plugin" "NSRingo / iRingo.Maps.plugin v4.6.1"
          mirror "https://github.com/NSRingo/News/releases/download/v3.2.1/iRingo.News.plugin" \
            "iringo/iRingo.News.plugin" "NSRingo / iRingo.News.plugin v3.2.1"
          mirror "https://github.com/NSRingo/Siri/releases/download/v4.2.7/iRingo.Siri.plugin" \
            "iringo/iRingo.Siri.plugin" "NSRingo / iRingo.Siri.plugin v4.2.7"
          mirror "https://github.com/NSRingo/Siri/releases/download/v4.2.7/iRingo.Search.plugin" \
            "iringo/iRingo.Search.plugin" "NSRingo / iRingo.Search.plugin v4.2.7"
          mirror "https://github.com/NSRingo/TestFlight/releases/download/v3.4.0/iRingo.TestFlight.plugin" \
            "iringo/iRingo.TestFlight.plugin" "NSRingo / iRingo.TestFlight.plugin v3.4.0"

          # в”Җв”Җ еҶҷеҮәж–°жё…еҚ• (жҢүж–Үд»¶еҗҚжҺ’еәҸ) в”Җв”Җ
          node -e '
            const entries = process.argv.slice(1).map(s => { const i = s.indexOf(":"); return [s.slice(1, i-1).trim().replace(/^"|"$/g,""), s.slice(i+1).trim()]; });
            entries.sort((a,b) => a[0].localeCompare(b[0]));
            const files = {};
            for (const [k, v] of entries) files[k] = JSON.parse(v);
            const manifest = {
              "$comment": "й•ңеғҸж–Үд»¶е“ҲеёҢжё…еҚ• вҖ” з”ұ mirror-scripts.yml з»ҙжҠӨ; еҸҳжӣҙдјҡеҮәзҺ°еңЁй•ңеғҸ PR зҡ„ diff дёӯ, еҗҲе№¶еүҚиҜ·ж ёеҜ№ source еҸҳжӣҙжҳҜеҗҰз¬ҰеҗҲйў„жңҹ",
              generated_at: new Date().toISOString().replace(/\.\d+Z$/, "Z"),
              files
            };
            require("fs").writeFileSync("Mirror/MANIFEST.json", JSON.stringify(manifest, null, 2) + "\n");
          ' "${ENTRIES[@]}"

          echo ""
          echo "== Mirror Summary: $SUCCESS succeeded, $FAIL failed (gated: $GATED) =="
          echo "success=$SUCCESS" >> $GITHUB_ENV
          echo "fail=$FAIL" >> $GITHUB_ENV
          echo "gated=$GATED" >> $GITHUB_ENV

      # PR еҲ¶: еҸҳжӣҙжҺЁйҖҒеҲ° mirror/<date> еҲҶж”Ҝе№¶ејҖ/жӣҙж–° PR, дёҚеҶҚзӣҙжҺЁ main
      - name: Open or update mirror PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Mirror/
          if git diff --cached --quiet; then
            echo "ж— еҸҳжӣҙ, и·іиҝҮ PR"
            echo "pr_action=none" >> $GITHUB_ENV
            exit 0
          fi
          BRANCH="mirror/$(date +%Y-%m-%d)"
          git checkout -B "$BRANCH"
          git commit -m "chore(mirror): дёҠжёёиө„жәҗеҗҢжӯҘ ($(date +%Y-%m-%d)) вҖ” еҫ…е®Ўж ё"
          git push -f origin "$BRANCH"
          CHANGED=$(git diff --name-only main...HEAD -- Mirror/ | grep -v MANIFEST.json | wc -l)
          if gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr edit "$BRANCH" --body "$(printf '## й•ңеғҸеҗҢжӯҘ %s\n\nеҸҳжӣҙж–Үд»¶: %s дёӘ (дёҚеҗ« MANIFEST)\n\n```%s```\n\n### е®Ўж ёжё…еҚ•\n- [ ] MANIFEST.json diff: жҜҸдёӘеҸҳжӣҙж–Үд»¶зҡ„ sha256 дёҺ source_url е·Іж ёеҜ№\n- [ ] дёҠжёёеҸҳжӣҙз¬ҰеҗҲйў„жңҹ (йқһжҠ•жҜ’/йқһз ҙеқҸжҖ§жӣҙж–°)\n- [ ] CI е…Ёз»ҝ\n\n> й—ЁзҰҒ: *.js иҝҮ node --check иҜӯжі• / дҪ“з§ҜвүҘ200B / йқһ HTML й”ҷиҜҜйЎө; жңӘиҝҮй—ЁзҰҒзҡ„ж–Үд»¶дҝқз•ҷж—§зүҲ' "$(date +%Y-%m-%d)" "$CHANGED" "$(git diff --stat main...HEAD -- Mirror/)")"
            echo "pr_action=updated" >> $GITHUB_ENV
          else
            gh pr create --base main --head "$BRANCH" \
              --title "chore(mirror): дёҠжёёиө„жәҗеҗҢжӯҘ ($(date +%Y-%m-%d))" \
              --body "$(printf '## й•ңеғҸеҗҢжӯҘ %s\n\nеҸҳжӣҙж–Үд»¶: %s дёӘ (дёҚеҗ« MANIFEST)\n\n```%s```\n\n### е®Ўж ёжё…еҚ•\n- [ ] MANIFEST.json diff: жҜҸдёӘеҸҳжӣҙж–Үд»¶зҡ„ sha256 дёҺ source_url е·Іж ёеҜ№\n- [ ] дёҠжёёеҸҳжӣҙз¬ҰеҗҲйў„жңҹ (йқһжҠ•жҜ’/йқһз ҙеқҸжҖ§жӣҙж–°)\n- [ ] CI е…Ёз»ҝ\n\n> й—ЁзҰҒ: *.js иҝҮ node --check иҜӯжі• / дҪ“з§ҜвүҘ200B / йқһ HTML й”ҷиҜҜйЎө; жңӘиҝҮй—ЁзҰҒзҡ„ж–Үд»¶дҝқз•ҷж—§зүҲ' "$(date +%Y-%m-%d)" "$CHANGED" "$(git diff --stat main...HEAD -- Mirror/)")"
            echo "pr_action=created" >> $GITHUB_ENV
          fi

      - name: Report summary
        if: always()
        run: |
          echo "### Mirror Scripts Report" >> $GITHUB_STEP_SUMMARY
          echo "| Date | Succeeded | Failed | Gated | PR |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|--------|-------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| $(date +%Y-%m-%d) | ${{ env.success }} | ${{ env.fail }} | ${{ env.gated }} | ${{ env.pr_action }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.fail }}" -gt 0 ]; then
            echo "### вҡ пёҸ Some mirrors failed or were gated" >> $GITHUB_STEP_SUMMARY
            echo "Check run logs for details. иў«й—ЁзҰҒжӢҰжҲӘзҡ„ж–Үд»¶дҝқз•ҷж—§зүҲ, дёҚеҪұе“ҚеҲҶеҸ‘гҖӮ" >> $GITHUB_STEP_SUMMARY
          fi
