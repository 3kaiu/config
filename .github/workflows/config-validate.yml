name: Config Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 1. Plugin 元信息检查 ──
      - name: Check plugin metadata
        run: |
          echo "## Plugin Metadata Check" >> $GITHUB_STEP_SUMMARY
          MISSING=0
          # 自维护插件: 严格要求 #!name + #!version
          for f in Plugin/*.plugin; do
            name=$(grep -m1 '#!name=' "$f" | sed 's/#!name=//')
            ver=$(grep -m1 '#!version=' "$f" | sed 's/#!version=//')
            desc=$(grep -m1 '#!desc=' "$f" | sed 's/#!desc=//')
            if [ -z "$name" ]; then echo "❌ $f: missing #!name"; MISSING=$((MISSING+1)); fi
            if [ -z "$ver" ]; then echo "⚠️ $f: missing #!version"; MISSING=$((MISSING+1)); fi
            if [ -z "$desc" ]; then echo "⚠️ $f: missing #!desc"; fi
            echo "| $(basename $f) | ${name:-UNKNOWN} | v${ver:-?} | OK |" >> $GITHUB_STEP_SUMMARY
          done
          # Kelee/ 为 vendored 第三方插件 (sync-kelee 每日覆写), 元信息仅警告不阻断
          for f in Kelee/*.plugin; do
            name=$(grep -m1 '#!name=' "$f" | sed 's/#!name=//')
            ver=$(grep -m1 '#!version=' "$f" | sed 's/#!version=//')
            if [ -z "$ver" ]; then echo "ℹ️ $f: vendored 插件无 #!version (不阻断)"; fi
            echo "| $(basename $f) | ${name:-UNKNOWN} | v${ver:-?} (vendored) | OK |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          exit $MISSING

      # ── 2. Script-path URL 可达性检查 ──
      - name: Check script-path URLs (lightweight)
        run: |
          echo "## Script-Path URL Check" >> $GITHUB_STEP_SUMMARY
          grep -rh 'script-path=' Plugin/*.plugin Kelee/*.plugin Profile/QX.conf 2>/dev/null | \
            grep -oP 'https?://[^"'\'',]+' | sort -u > /tmp/urls.txt
          FAIL=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            code=$(curl -fsSL -m 15 -o /dev/null -w "%{http_code}" "$url" || echo "FAIL")
            if [ "$code" = "FAIL" ] || [ "$code" = "000" ]; then
              echo "❌ $url → $code"
              FAIL=$((FAIL+1))
            else
              echo "✅ $url → $code"
            fi
          done < /tmp/urls.txt
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Failures: $FAIL" >> $GITHUB_STEP_SUMMARY
          exit $FAIL

      # ── 3. 双端配置交叉核对 ──
      - name: Cross-check Loon vs QX rule coverage
        run: |
          echo "## Loon vs QX Cross-Check" >> $GITHUB_STEP_SUMMARY
          MISSING=0
          # 检查微信域名是否在 QX 中直连
          for domain in wechat.com weixin.qq.com wx.qq.com qpic.cn; do
            in_qx=$(grep -c "host-suffix, $domain, direct" Profile/QX.conf)
            if [ "$in_qx" -eq 0 ]; then
              echo "⚠️ QX 缺少 $domain DIRECT 规则" >> $GITHUB_STEP_SUMMARY
              MISSING=$((MISSING+1))
            fi
          done
          # 检查策略组路由是否双端一致 (Global.list 未完整覆盖的域名)
          # v7.8: 策略组拆分后, twittercdn/tdesktop 走 Social, steamcdn/onedrive/wikimedia 走 Developer
          for domain in twittercdn.com tdesktop.com steamcdn-a.akamaihd.net onedrive.live.com wikimediafoundation.org; do
            in_qx=$(grep -cE "host-suffix, $domain, (Proxy|Streaming|Social|Developer|AI)" Profile/QX.conf)
            in_loon=$(grep -cE "DOMAIN-SUFFIX, $domain, (Proxy|Streaming|Social|Developer|AI)" Profile/Loon.lcf)
            if [ "$in_qx" -eq 0 ]; then echo "⚠️ QX 缺少 $domain 代理规则"; MISSING=$((MISSING+1)); fi
            if [ "$in_loon" -eq 0 ]; then echo "⚠️ Loon 缺少 $domain 代理规则"; MISSING=$((MISSING+1)); fi
          done
          # 检查 Proxy 组正则一致性
          loon_regex=$(grep "Proxy = url-test" Profile/Loon.lcf | grep -o '".*"')
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Loon Proxy regex | $loon_regex |" >> $GITHUB_STEP_SUMMARY
          if [ "$loon_regex" != '".*"' ]; then
            echo "⚠️ Loon Proxy regex 非预期: $loon_regex" >> $GITHUB_STEP_SUMMARY
            MISSING=$((MISSING+1))
          fi
          echo "| Missing rules | $MISSING |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          exit $MISSING

      # ── 4. 银行域名 MitM 冲突检测 ──
      - name: Bank MitM conflict detection
        run: |
          echo "## Bank MitM Conflict Check" >> $GITHUB_STEP_SUMMARY
          # 提取银行负向排除域名列表
          loon_banks=$(grep -oP '(?<=, )-\*\.\w+\.(com|cn)' Profile/Loon.lcf | grep -v 'apple\|icloud' | sed 's/-\*\.//' | sort)
          qx_banks=$(grep -oP '(?<=, )-\*\.\w+\.(com|cn)' Profile/QX.conf | grep -v 'apple\|icloud' | sed 's/-\*\.//' | sort)
          # 对比配置数量
          loon_count=$(echo "$loon_banks" | wc -l)
          qx_count=$(echo "$qx_banks" | wc -l)
          echo "| Config | Bank excludes |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Loon | $loon_count |" >> $GITHUB_STEP_SUMMARY
          echo "| QX | $qx_count |" >> $GITHUB_STEP_SUMMARY
          # 找差异
          diff <(echo "$loon_banks") <(echo "$qx_banks") && echo "✅ 银行域名排除双端一致" >> $GITHUB_STEP_SUMMARY || echo "⚠️ 银行域名排除存在差异" >> $GITHUB_STEP_SUMMARY

      # ── 5. MitM hostname 双端 diff 检查 ──
      - name: MitM hostname cross-check
        run: |
          echo "## MitM Hostname Cross-Check" >> $GITHUB_STEP_SUMMARY
          # 提取 Loon.lcf 的 hostname 行中所有正向域名（非 - 开头）
          loon_hostname_line=$(grep '^hostname = ' Profile/Loon.lcf)
          qx_hostname_line=$(grep '^hostname = ' Profile/QX.conf)
          # 提取正向域名（逗号分隔，去除前导空格，过滤 - 开头的负向排除）
          echo "$loon_hostname_line" | sed 's/^hostname = //' | tr ',' '\n' | sed 's/^ //' | grep -v '^-' | sort -u > /tmp/loon_hostnames.txt
          echo "$qx_hostname_line" | sed 's/^hostname = //' | tr ',' '\n' | sed 's/^ //' | grep -v '^-' | sort -u > /tmp/qx_hostnames.txt
          loon_count=$(wc -l < /tmp/loon_hostnames.txt)
          qx_count=$(wc -l < /tmp/qx_hostnames.txt)
          echo "| Config | Positive hostnames |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Loon | $loon_count |" >> $GITHUB_STEP_SUMMARY
          echo "| QX | $qx_count |" >> $GITHUB_STEP_SUMMARY
          # Loon 有但 QX 没有的域名
          only_loon=$(comm -23 /tmp/loon_hostnames.txt /tmp/qx_hostnames.txt)
          # QX 有但 Loon 没有的域名
          only_qx=$(comm -13 /tmp/loon_hostnames.txt /tmp/qx_hostnames.txt)
          if [ -n "$only_loon" ]; then
            echo "⚠️ **Loon 有但 QX 没有的 MitM hostname**:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$only_loon" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "$only_qx" ]; then
            echo "⚠️ **QX 有但 Loon 没有的 MitM hostname**:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$only_qx" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -z "$only_loon" ] && [ -z "$only_qx" ]; then
            echo "✅ MitM hostname 双端完全一致" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ MitM hostname 双端存在差异（warning，不阻断）" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      # ── 6. HTTPDNS Rewrite 对齐检查 ──
      - name: HTTPDNS rewrite alignment check
        run: |
          echo "## HTTPDNS Rewrite Alignment" >> $GITHUB_STEP_SUMMARY
          # 统计 Loon [Rewrite] 段中以 /d 结尾的 HTTPDNS reject-200 规则数
          loon_httpdns=$(grep -c 'reject-200$' Profile/Loon.lcf || echo 0)
          # 统计 QX [rewrite_local] 段中 url reject-200 且含 /d 的 HTTPDNS 规则数
          qx_httpdns=$(grep '/d url reject-200' Profile/QX.conf | wc -l || echo 0)
          echo "| Config | HTTPDNS rewrite count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Loon | $loon_httpdns |" >> $GITHUB_STEP_SUMMARY
          echo "| QX | $qx_httpdns |" >> $GITHUB_STEP_SUMMARY
          if [ "$loon_httpdns" -ne "$qx_httpdns" ]; then
            echo "⚠️ HTTPDNS rewrite 数量不一致: Loon=$loon_httpdns, QX=$qx_httpdns（warning，不阻断）" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ HTTPDNS rewrite 数量一致: $loon_httpdns 条" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      # ── 7. Snippet 双端域名内容级 diff 检查 ──
      - name: Snippet alignment check (content-level diff)
        run: |
          echo "## Snippet Alignment Check (Content-Level Diff)" >> $GITHUB_STEP_SUMMARY
          FAIL=0
          for pair in streaming social ai-services developer bank-ad-reject; do
            tpl_file="template/snippet/${pair}.tpl"
            qx_file="template/snippet/${pair}.qx"
            if [ ! -f "$tpl_file" ] || [ ! -f "$qx_file" ]; then
              echo "⚠️ ${pair}: 缺少 .tpl 或 .qx 文件" >> $GITHUB_STEP_SUMMARY
              FAIL=$((FAIL+1))
              continue
            fi
            # 提取 Loon 格式的域名 (DOMAIN/DOMAIN-SUFFIX/DOMAIN-KEYWORD 后的域名，去除策略名)
            # 格式: DOMAIN-SUFFIX, youtube.com, Streaming → 提取 youtube.com
            grep -oE '^(DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN), [^,]+,' "$tpl_file" \
              | sed -E 's/^(DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN), ([^,]+),/\2/' | sort -u > /tmp/tpl_${pair}_domains.txt
            # 对于 DEST-PORT 也提取
            grep -oE '^DEST-PORT, [0-9]+,' "$tpl_file" \
              | sed -E 's/^DEST-PORT, ([0-9]+),/\1/' | sort -u >> /tmp/tpl_${pair}_domains.txt
            sort -u -o /tmp/tpl_${pair}_domains.txt /tmp/tpl_${pair}_domains.txt

            # 提取 QX 格式的域名 (host/host-suffix/host-keyword 后的域名，去除策略名)
            # 格式: host-suffix, youtube.com, Streaming → 提取 youtube.com
            grep -oE '^(host-suffix|host-keyword|host), [^,]+,' "$qx_file" \
              | sed -E 's/^(host-suffix|host-keyword|host), ([^,]+),/\2/' | sort -u > /tmp/qx_${pair}_domains.txt
            # 对于 dest-port 也提取
            grep -oE '^dest-port, [0-9]+,' "$qx_file" \
              | sed -E 's/^dest-port, ([0-9]+),/\1/' | sort -u >> /tmp/qx_${pair}_domains.txt
            sort -u -o /tmp/qx_${pair}_domains.txt /tmp/qx_${pair}_domains.txt

            tpl_count=$(wc -l < /tmp/tpl_${pair}_domains.txt)
            qx_count=$(wc -l < /tmp/qx_${pair}_domains.txt)

            # 逐域名 diff
            only_tpl=$(comm -23 /tmp/tpl_${pair}_domains.txt /tmp/qx_${pair}_domains.txt)
            only_qx=$(comm -13 /tmp/tpl_${pair}_domains.txt /tmp/qx_${pair}_domains.txt)

            if [ -z "$only_tpl" ] && [ -z "$only_qx" ]; then
              echo "| ${pair} | ${tpl_count} domains | ✅ 一致 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ${pair} | Loon: ${tpl_count} / QX: ${qx_count} | ❌ 有差异 |" >> $GITHUB_STEP_SUMMARY
              echo "❌ **${pair} 域名内容不一致**:" >> $GITHUB_STEP_SUMMARY
              if [ -n "$only_tpl" ]; then
                echo "- 仅 Loon 有:" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "$only_tpl" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
              if [ -n "$only_qx" ]; then
                echo "- 仅 QX 有:" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "$only_qx" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
              FAIL=$((FAIL+1))
            fi
          done
          if [ "$FAIL" -eq 0 ]; then
            echo "✅ 所有 snippet 双端域名内容完全一致" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ $FAIL 个 snippet 双端域名内容不一致" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          exit $FAIL

      # ── 9. Qidian 内嵌引擎完整性校验 ──
      - name: Qidian engine integrity check
        run: |
          echo "## Qidian Engine Integrity" >> $GITHUB_STEP_SUMMARY
          node -e '
            const fs = require("fs"), crypto = require("crypto");
            const s = fs.readFileSync("Scripts/Qidian.js", "utf8");
            const manifest = JSON.parse(fs.readFileSync("Scripts/ENGINE-MANIFEST.json", "utf8"));
            const start = manifest.integrity.blob_start_marker;
            const endMark = manifest.integrity.blob_end_marker;
            const i = s.indexOf(start), j = s.indexOf(endMark);
            if (i < 0 || j < 0) { console.log("❌ 引擎 blob marker 未找到"); process.exit(1); }
            const blob = s.slice(i, j + endMark.length);
            const h = crypto.createHash("sha256").update(blob).digest("hex");
            const pm = blob.match(/[\x27"]([A-Za-z0-9+/=]{10000,})[\x27"]/);
            const ph = pm ? crypto.createHash("sha256").update(pm[1]).digest("hex") : "(未提取到)";
            console.log("| Field | Manifest | Actual |");
            console.log("|-------|----------|--------|");
            console.log("| blob sha256 | `" + manifest.integrity.embedded_blob_sha256.slice(0, 16) + "…` | `" + h.slice(0, 16) + "…` |");
            console.log("| rc4 payload sha256 | `" + manifest.integrity.rc4_payload_sha256.slice(0, 16) + "…` | `" + ph.slice(0, 16) + "…` |");
            console.log("| upstream commit | " + manifest.engine.upstream_commit_at_embed.slice(0, 10) + " | - |");
            if (h !== manifest.integrity.embedded_blob_sha256) {
              console.log("❌ 引擎 blob 哈希与 ENGINE-MANIFEST.json 不符 — 引擎已被修改但清单未更新");
              console.log("按 manifest 的 update_procedure 审查变更并更新清单后重试");
              process.exit(1);
            }
            console.log("✅ 引擎 blob 与清单一致 (upstream " + manifest.engine.upstream_commit_at_embed.slice(0, 10) + ")");
          ' 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          exit ${PIPESTATUS[0]}

      # ── 8. 主配置版本号一致性 ──
      - name: Check version consistency
        run: |
          echo "## Version Consistency" >> $GITHUB_STEP_SUMMARY
          loon_ver=$(grep -oP 'v\d+\.\d+' Profile/Loon.lcf | head -1)
          qx_ver=$(grep -oP 'v\d+\.\d+' Profile/QX.conf | head -1)
          plugin_vers=$(grep -rh '#!version=' Plugin/*.plugin Kelee/*.plugin | sed 's/#!version=//' | sort -u | tr '\n' ' ')
          echo "| Config | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Loon.lcf | $loon_ver |" >> $GITHUB_STEP_SUMMARY
          echo "| QX.conf | $qx_ver |" >> $GITHUB_STEP_SUMMARY
          if [ "$loon_ver" != "$qx_ver" ]; then
            echo "❌ 版本不一致: Loon=$loon_ver, QX=$qx_ver" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ 版本一致: $loon_ver" >> $GITHUB_STEP_SUMMARY

      # ── 10. QX 规则顺序防遮蔽检查 ──
      # QX 按书写顺序匹配: Google 通配 (googleapis.com/google.com → Streaming)
      # 若写在 AI 分流或 Google 分析 reject 之前, 会截胡 Gemini API 并使 4 条 reject 静默失效
      - name: QX rule-order shadowing guard
        run: |
          echo "## QX Rule-Order Guard" >> $GITHUB_STEP_SUMMARY
          wild_line=$(grep -n '^host-suffix, googleapis\.com, Streaming' Profile/QX.conf | cut -d: -f1)
          wild2_line=$(grep -n '^host-suffix, google\.com, Streaming' Profile/QX.conf | cut -d: -f1)
          ai_line=$(grep -n '^host-suffix, generativelanguage\.googleapis\.com' Profile/QX.conf | cut -d: -f1)
          fb_line=$(grep -n '^host-suffix, firebaseinstallations\.googleapis\.com, reject' Profile/QX.conf | cut -d: -f1)
          ads_line=$(grep -n '^host-suffix, adservice\.google\.com, reject' Profile/QX.conf | cut -d: -f1)
          if [ -z "$wild_line" ] || [ -z "$wild2_line" ] || [ -z "$ai_line" ] || [ -z "$fb_line" ] || [ -z "$ads_line" ]; then
            echo "❌ 缺少必要规则行 (wild=$wild_line/$wild2_line ai=$ai_line fb=$fb_line ads=$ads_line)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          FAIL=0
          for anchor in "AI:$ai_line" "Firebase:$fb_line" "adservice:$ads_line"; do
            name=${anchor%%:*}; line=${anchor##*:}
            if [ "$wild_line" -lt "$line" ]; then
              echo "❌ Google 通配 (L$wild_line) 在 $name (L$line) 之前 — $name 被遮蔽" >> $GITHUB_STEP_SUMMARY
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 0 ]; then
            echo "✅ 顺序正确: Google 通配 L$wild_line 位于 AI L$ai_line / Firebase L$fb_line / adservice L$ads_line 之后" >> $GITHUB_STEP_SUMMARY
          fi
          exit $FAIL
