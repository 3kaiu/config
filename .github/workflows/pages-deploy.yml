# 第二分发源: GitHub Pages 兜底 (长期演进 #13)
#
# 用途: ws.wenn.in 故障/域名丢失时的备用分发通道。
#   ws.wenn.in/main/<path>  ←→  https://3kaiu.github.io/config/<path>
# 启用方法 (一次性): 仓库 Settings → Pages → Source 选 "GitHub Actions"。
# 切换方法: 见 doc/infrastructure.md「应急切换」。

name: Deploy Fallback (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Pages 未启用时优雅跳过 (启用方法: Settings → Pages → Source: GitHub Actions, 一次性)
      - name: Check Pages enabled
        id: pages_check
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [ "$code" = "200" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "✅ Pages 已启用, 继续部署"
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "::warning::Pages 未启用, 跳过备用分发部署 — 启用方法: 仓库 Settings → Pages → Source 选 'GitHub Actions' (一次性)"
          fi

      # 排除 .git / node_modules / 审计产物，其余全量发布
      - name: Prepare artifact
        if: steps.pages_check.outputs.enabled == 'true'
        run: |
          mkdir -p /tmp/pages
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='.github' ./ /tmp/pages/
          echo "Published files:" && find /tmp/pages -type f | wc -l

      - name: Setup Pages
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages

      - name: Deploy to GitHub Pages
        if: steps.pages_check.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
